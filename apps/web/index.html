<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PulseChat — private, real-time chat and social." />
    <!-- §24.9 installable PWA: manifest + iOS-specific tags (Android/desktop
         read the manifest alone; iOS Safari also needs these explicitly). -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#7a5cf6" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PulseChat" />
    <!-- Wireframe type ramp: Manrope 400–800 (PulseChat Wireframes.dc.html §type). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>PulseChat</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
