# coturn configuration for PulseChat's self-hosted TURN relay
# (Technical Spec §11 — Oracle Cloud Always-Free VM, systemd service).
#
# Secrets are NOT stored in this file: static-auth-secret is injected from
# /etc/coturn/secret.env by the systemd drop-in (see README.md). The same
# value must be set as TURN_SHARED_SECRET on the API host — the API issues
# short-lived credentials with the standard TURN REST scheme.

listening-port=3478
tls-listening-port=5349

# Replace with the VM's public IP / DNS name during provisioning.
# external-ip auto-detection works on Oracle when the public IP is 1:1 NAT'd:
# external-ip=<PUBLIC_IP>/<PRIVATE_IP>
realm=turn.pulsechat.example
server-name=turn.pulsechat.example

# Short-lived credential mechanism (TURN REST API) — no static users.
use-auth-secret
# static-auth-secret is provided via command line / env file, not here.

# Let's Encrypt certificates for TLS (certbot on the VM, see README).
cert=/etc/letsencrypt/live/turn.pulsechat.example/fullchain.pem
pkey=/etc/letsencrypt/live/turn.pulsechat.example/privkey.pem

# Relay port range — must match the VM's opened ingress rules.
min-port=49152
max-port=65535

# Hardening
no-cli
no-tlsv1
no-tlsv1_1
fingerprint
stale-nonce=600
# Deny relaying to private ranges (SSRF-style abuse prevention).
no-multicast-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=127.0.0.0-127.255.255.255

# Free-tier friendliness: cap per-session bandwidth (bytes/second).
max-bps=1500000
total-quota=100
user-quota=50

log-file=/var/log/turnserver/turnserver.log
simple-log
