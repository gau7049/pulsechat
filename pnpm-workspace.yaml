packages:
  - apps/*
  - packages/*
allowBuilds:
  # Declined: none of these postinstall scripts are needed for dev/lint/
  # typecheck/test/build. The Chromium download for e2e is a deliberate,
  # explicit one-time step instead: `pnpm exec playwright install chromium`.
  '@playwright/browser-chromium': false
  '@prisma/client': true
  '@prisma/engines': true
  esbuild: true
  prisma: true
  protobufjs: false
  unix-dgram: false
