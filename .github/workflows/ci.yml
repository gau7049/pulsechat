# CI (Technical Spec §16): lint → typecheck → unit tests → build on every push/PR.
# Deploys fire only on main and only when the corresponding secret exists.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      # Ephemeral Postgres for API integration tests (Technical Spec §19).
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pulsechat_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pulsechat_test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prisma generate
      - run: pnpm exec prisma migrate deploy
        # No-op until the first migration exists; validates migrations after.
        continue-on-error: false
      # M12: fail the build on a high/critical known vulnerability in what
      # actually ships to production — `--prod` excludes dev-only tooling
      # (e.g. artillery, used solely by the local-only `pnpm test:load`),
      # which would otherwise fail this on vulnerabilities nothing runtime
      # ever depends on. Dependabot (.github/dependabot.yml) handles the
      # ongoing "keep everything, including dev deps, patched" side.
      - run: pnpm audit --prod --audit-level=high
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  deploy:
    needs: verify
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      # Render and Vercel both redeploy via their free Git-integration deploy
      # hooks — a POST is all CI needs (Technical Spec §16).
      - name: Trigger Render deploy (api)
        if: ${{ vars.RENDER_DEPLOY_HOOK_SET == 'true' }}
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      - name: Trigger Vercel deploy (web)
        if: ${{ vars.VERCEL_DEPLOY_HOOK_SET == 'true' }}
        run: curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL"
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
